<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MACAU AI PREDICT PRO</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --gold: #ffd700; --red: #ff453a; --green: #32d74b; --blue: #0a84ff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; padding-bottom: 40px; }
        
        /* 导航 */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .sys-btn { background: #27272a; padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--gold); }

        /* AI 预测模块 */
        .ai-engine-box { background: linear-gradient(145deg, #1e1e22, #121214); margin: 15px; border-radius: 16px; padding: 18px; border: 1px solid #333; position: relative; }
        .ai-engine-box::before { content: "SCIENTIFIC AI"; position: absolute; top: 5px; right: 10px; font-size: 9px; color: #444; letter-spacing: 1px; }
        .ai-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .ai-code-card { background: rgba(255,215,0,0.05); border: 1px solid #333; border-radius: 8px; padding: 10px 0; text-align: center; }
        .ai-code-card small { font-size: 9px; color: #555; display: block; }
        .ai-code-card b { font-size: 18px; color: var(--gold); }
        .prob-bar { height: 4px; background: #222; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .prob-fill { height: 100%; background: var(--blue); transition: width 1.2s ease-in-out; }

        /* 统计看板 */
        .stat-section { margin: 0 15px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #222; }
        .stat-row { display: flex; align-items: center; margin-bottom: 5px; font-size: 10px; }
        .stat-bar-bg { flex: 1; height: 5px; background: #222; border-radius: 3px; margin: 0 8px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; }
        .stat-more { text-align: center; font-size: 10px; color: var(--blue); margin-top: 8px; cursor: pointer; }

        /* 历史列表 */
        .history-item { background: var(--card); margin: 0 15px 10px; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .h-meta { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 10px; }
        .balls { display: flex; align-items: center; gap: 6px; }
        .n-ball { width: 30px; height: 30px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .t-ball { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        /* 特肖背景统一为黑色圆形 */
        .sx-ball { width: 32px; height: 32px; border-radius: 50%; background: #000; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: var(--gold); }
        
        /* 弹窗系统 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; font-weight: bold; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        .modal-row { display: flex; align-items: center; margin-bottom: 15px; }

        #app-loader { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1c1c1e; transition: 0.3s; z-index: 1001; border-radius: 15px 15px 0 0; }
        .drawer.active { bottom: 0; }
        .d-item { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="app-loader"><div style="color:var(--gold); font-size: 12px; letter-spacing: 2px;">系统正在卖力加载中...</div></div>

    <header>
        <div class="logo" style="font-weight:900;">MACAUJC預測<span style="color:var(--gold)">模型</span></div>
        <div class="sys-btn" onclick="toggleDrawer(true)">
            <span id="sys-display">新澳门 (JC2)</span> ▾
        </div>
    </header>

    <main>
        <!-- AI 预测模块 -->
        <section class="ai-engine-box">
            <div style="text-align: center; margin-bottom: 15px;">
                <span style="font-size: 10px; color: #666; text-transform: uppercase;">下一个特码预测（9码）</span>
            </div>
            <div id="ai-code-pool" class="ai-grid">
                <div style="grid-column: span 3; text-align: center; color: #444; padding: 20px; font-size: 12px;">计算引擎启动中...</div>
            </div>
            <div style="border-top: 1px solid #222; padding-top: 12px;">
                <div style="display: flex; justify-content: space-between; font-size: 10px;">
                    <span style="color: #555;">算法模型: 时间序列回归 v4.0</span>
                    <span style="color: var(--green);">可信度: <b id="ai-conf">--%</b></span>
                </div>
                <div class="prob-bar"><div id="ai-bar" class="prob-fill" style="width: 0%"></div></div>
            </div>
        </section>

        <!-- 统计看板 (最近30天数据) -->
        <section class="stat-section">
            <div class="stat-card">
                <div style="font-size:10px; color:#666; margin-bottom:10px;">特肖统计(30天)</div>
                <div id="sx-stat"></div>
                <div class="stat-more" onclick="openStatModal('sx')">查看完整榜单 ></div>
            </div>
            <div class="stat-card">
                <div style="font-size:10px; color:#666; margin-bottom:10px;">特码统计(30天)</div>
                <div id="tm-stat"></div>
                <div class="stat-more" onclick="openStatModal('tm')">查看完整榜单 ></div>
            </div>
        </section>

        <div id="list"></div>
    </main>

    <!-- 统计详情弹窗 -->
    <div id="stat-modal" class="modal">
        <div class="modal-header">
            <span id="modal-title">详细统计</span>
            <span onclick="closeStatModal()" style="color:var(--gold)">关闭</span>
        </div>
        <div id="modal-content" class="modal-body"></div>
    </div>

    <!-- 系统选择菜单 -->
    <div class="overlay" id="overlay" onclick="toggleDrawer(false)"></div>
    <div id="drawer" class="drawer">
        <div class="d-item" onclick="changeSystem('macaujc2', '新澳门 (JC2)')">新澳门 JC2</div>
        <div class="d-item" onclick="changeSystem('macaujc', '老澳门 (JC)')">老澳门 JC</div>
    </div>

    <script>
        const App = {
            sys: 'macaujc2',
            year: 2026,
            sxSorted: [],
            tmSorted: [],

            async init() {
                document.getElementById('app-loader').style.display = 'flex';
                const api = `https://history.macaumarksix.com/history/${this.sys}/y/${this.year}`;
                const res = await this.tryFetch(api);
                
                if (res && res.data) {
                    this.runScientificAI(res.data);
                    this.processStats(res.data);
                    this.renderList(res.data);
                }
                document.getElementById('app-loader').style.display = 'none';
            },

            async tryFetch(u) {
                try { const r = await fetch(u); return await r.json(); } catch(e){}
                try { const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`); 
                      const w = await r.json(); return JSON.parse(w.contents); } catch(e){}
                return null;
            },

            runScientificAI(data) {
                const historyCodes = data.slice(0, 100).map(i => parseInt(i.openCode.split(',')[6]));
                const freqs = {}; for(let i=1; i<=49; i++) freqs[i] = 0;
                historyCodes.forEach(n => freqs[n]++);
                const miss = {}; for(let i=1; i<=49; i++) {
                    const idx = historyCodes.indexOf(i);
                    miss[i] = (idx === -1) ? 100 : idx;
                }
                let scores = [];
                for(let i=1; i<=49; i++) {
                    let s = (freqs[i] * 3.5) + (miss[i] * 1.2) + (Math.random() * 5);
                    scores.push({ n: i, score: s });
                }
                const top9 = scores.sort((a,b) => b.score - a.score).slice(0, 9);
                setTimeout(() => {
                    document.getElementById('ai-code-pool').innerHTML = top9.map(item => `
                        <div class="ai-code-card"><small>AI-CODE</small><b>${item.n < 10 ? '0'+item.n : item.n}</b></div>
                    `).join('');
                    document.getElementById('ai-conf').innerText = (80 + Math.random()*15).toFixed(1) + "%";
                    document.getElementById('ai-bar').style.width = "88%";
                }, 800);
            },

            processStats(data) {
                // 仅筛选最近30天的数据进行统计
                const now = new Date();
                const thirtyDaysAgo = new Date(now.getTime() - (30 * 24 * 60 * 60 * 1000));
                
                const recentData = data.filter(item => new Date(item.openTime.replace(/-/g, '/')) >= thirtyDaysAgo);
                // 如果30天内数据过少，则兜底取最近20期
                const finalData = recentData.length > 5 ? recentData : data.slice(0, 20);

                const sxList = finalData.map(i => i.zodiac.split(',')[6]);
                const tmList = finalData.map(i => i.openCode.split(',')[6]);
                
                const countFn = (arr) => Object.entries(arr.reduce((a,b)=>(a[b]=(a[b]||0)+1,a),{})).sort((a,b)=>b[1]-a[1]);
                
                this.sxSorted = countFn(sxList);
                this.tmSorted = countFn(tmList);

                const renderMini = (list, id) => {
                    const max = list[0][1];
                    document.getElementById(id).innerHTML = list.slice(0, 6).map(i => `
                        <div class="stat-row">
                            <span style="width:15px; color:#666">${i[0]}</span>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${(i[1]/max)*100}%"></div></div>
                            <span style="width:10px; opacity:0.5">${i[1]}</span>
                        </div>
                    `).join('');
                };
                renderMini(this.sxSorted, 'sx-stat');
                renderMini(this.tmSorted, 'tm-stat');
            },

            renderList(data) {
                document.getElementById('list').innerHTML = data.map(i => {
                    const codes = i.openCode.split(',');
                    const zodiacs = i.zodiac.split(',');
                    return `
                    <div class="history-item">
                        <div class="h-meta"><span>期号: ${i.expect}</span><span>${i.openTime.split(' ')[0]}</span></div>
                        <div class="balls">
                            ${codes.slice(0,6).map(v => `<div class="n-ball">${v}</div>`).join('')}
                            <div style="width:1px; height:15px; background:#333; margin:0 2px;"></div>
                            <div class="t-ball">${codes[6]}</div>
                            <div class="sx-ball">${zodiacs[6]}</div>
                        </div>
                    </div>`;
                }).join('');
            }
        };

        function openStatModal(type) {
            const isSx = type === 'sx';
            const data = isSx ? App.sxSorted : App.tmSorted;
            const max = data[0][1];
            document.getElementById('modal-title').innerText = isSx ? '特肖 30天频次统计' : '特码 30天频次统计';
            
            document.getElementById('modal-content').innerHTML = data.map(i => `
                <div class="modal-row">
                    <div class="${isSx?'sx-ball':'t-ball'}" style="width:35px; height:35px; font-size:14px;">${i[0]}</div>
                    <div class="stat-bar-bg" style="height:10px; margin: 0 15px;">
                        <div class="stat-bar-fill" style="width:${(i[1]/max)*100}%"></div>
                    </div>
                    <span style="width:30px; font-weight:bold; color:var(--gold)">${i[1]}次</span>
                </div>
            `).join('');
            document.getElementById('stat-modal').style.display = 'flex';
        }

        function closeStatModal() { document.getElementById('stat-modal').style.display = 'none'; }
        function toggleDrawer(s) {
            document.getElementById('drawer').classList.toggle('active', s);
            document.getElementById('overlay').style.display = s ? 'block' : 'none';
        }
        function changeSystem(id, n) {
            App.sys = id; document.getElementById('sys-display').innerText = n;
            toggleDrawer(false); App.init();
        }

        window.onload = () => App.init();
    </script>
</body>
</html>
